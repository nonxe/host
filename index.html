<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>End of Day</title>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --neon: #00c8ff;
      --neon-dim: rgba(0, 200, 255, 0.18);
      --neon-glow: rgba(0, 200, 255, 0.55);
      --bg: #080a0d;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --text: #e8f0f7;
      --muted: rgba(232,240,247,0.45);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* Ambient neon glow in corners */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(120px);
      opacity: 0.13;
    }
    body::before {
      width: 420px; height: 420px;
      background: var(--neon);
      top: -140px; left: -140px;
    }
    body::after {
      width: 380px; height: 380px;
      background: var(--neon);
      bottom: -130px; right: -130px;
    }

    .scene {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      padding: 32px 20px;
    }



    /* Main clock card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 36px 40px;
      width: 100%;
      max-width: 360px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,200,255,0.06),
        0 32px 64px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* Neon accent corner on card */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 80px; height: 80px;
      border-radius: 28px 0 40px 0;
      background: linear-gradient(135deg, rgba(0,200,255,0.22), transparent 60%);
      pointer-events: none;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 80px; height: 80px;
      border-radius: 0 28px 0 40px;
      background: linear-gradient(315deg, rgba(0,200,255,0.22), transparent 60%);
      pointer-events: none;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 18px;
      opacity: 0.8;
    }

    .time-display {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      margin-bottom: 6px;
    }

    .time-num {
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 72px;
      font-weight: 300;
      line-height: 1;
      color: var(--text);
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
    }

    .colon {
      font-size: 60px;
      font-weight: 200;
      line-height: 1;
      color: var(--neon);
      opacity: 0.7;
      margin-bottom: 4px;
      animation: blink 1s step-start infinite;
    }

    .time-unit {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
      margin-left: 2px;
    }

    .units-row {
      display: flex;
      gap: 20px;
      margin-top: 2px;
    }
    .unit-block { display: flex; flex-direction: column; }
    .unit-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Progress card */
    .progress-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 26px 32px;
      width: 100%;
      max-width: 360px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,200,255,0.04),
        0 20px 40px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: cardIn 0.9s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .progress-card::before {
      content: '';
      position: absolute;
      top: -1px; right: -1px;
      width: 60px; height: 60px;
      border-radius: 0 22px 0 30px;
      background: linear-gradient(315deg, rgba(0,200,255,0.18), transparent 60%);
      pointer-events: none;
    }

    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .progress-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--neon);
      opacity: 0.8;
    }
    .percent-badge {
      font-size: 13px;
      font-weight: 600;
      color: var(--neon);
      background: rgba(0,200,255,0.1);
      border: 1px solid rgba(0,200,255,0.2);
      border-radius: 100px;
      padding: 3px 12px;
      letter-spacing: 0.04em;
    }

    .track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
      position: relative;
    }
    .fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, rgba(0,200,255,0.5), var(--neon));
      box-shadow: 0 0 12px var(--neon-glow);
      transition: width 1s linear;
      position: relative;
    }
    .fill::after {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon-glow);
    }

    .track-ends {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }
    .track-end-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .year-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .year-label {
      font-size: 11px;
      color: rgba(232,240,247,0.3);
      letter-spacing: 0.04em;
    }
    .year-val {
      font-size: 11px;
      font-weight: 500;
      color: rgba(232,240,247,0.35);
      letter-spacing: 0.04em;
    }

    /* Mantra card */
    .mantra-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px 28px;
      width: 100%;
      max-width: 360px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,200,255,0.04),
        0 16px 32px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.04);
      animation: cardIn 1s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .mantra-card::before {
      content: '';
      position: absolute;
      bottom: -1px; left: -1px;
      width: 60px; height: 60px;
      border-radius: 0 30px 0 20px;
      background: linear-gradient(135deg, rgba(0,200,255,0.15), transparent 60%);
      pointer-events: none;
    }

    .quote-mark {
      font-size: 40px;
      line-height: 0.5;
      color: var(--neon);
      opacity: 0.3;
      font-family: Georgia, serif;
      margin-bottom: 10px;
      display: block;
    }

    .mantra-text {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .mantra-text strong {
      color: var(--neon);
      font-weight: 600;
    }

    /* Animations */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes blink {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 0.2; }
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon-glow); }
      50%       { box-shadow: 0 0 16px var(--neon), 0 0 32px var(--neon-glow); }
    }

    .fill::after { animation: pulse-dot 2s ease-in-out infinite; }

    /* seconds tiny */
    .seconds-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,200,255,0.07);
      border: 1px solid rgba(0,200,255,0.14);
      border-radius: 100px;
      padding: 4px 12px;
      margin-top: 14px;
    }
    .seconds-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--neon);
      animation: pulse-dot 1.4s ease-in-out infinite;
    }
    .seconds-text {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .seconds-val {
      font-size: 11px;
      font-weight: 600;
      color: var(--neon);
    }
  </style>
</head>
<body>



  <div class="scene">

    <!-- Time left card -->
    <div class="card">
      <div class="card-label">Time Until Midnight</div>
      <div class="time-display">
        <div>
          <div class="time-num" id="hours">00</div>
          <div class="unit-label">hours</div>
        </div>
        <div class="colon">:</div>
        <div>
          <div class="time-num" id="minutes">00</div>
          <div class="unit-label">minutes</div>
        </div>
      </div>
      <div class="seconds-chip">
        <div class="seconds-dot"></div>
        <span class="seconds-text">Live ·&nbsp;</span>
        <span class="seconds-val" id="seconds">00</span>
        <span class="seconds-text">&nbsp;sec remaining</span>
      </div>
    </div>

    <!-- Progress card -->
    <div class="progress-card">
      <div class="progress-header">
        <span class="progress-label">Day Remaining</span>
        <span class="percent-badge" id="percentBadge">0%</span>
      </div>
      <div class="track">
        <div class="fill" id="fillBar" style="width: 0%"></div>
      </div>
      <div class="track-ends">
        <span class="track-end-label">12:00 AM</span>
        <span class="track-end-label">11:59 PM</span>
      </div>
      <div class="year-row">
        <span class="year-label">Days left in <span id="yearNum"></span></span>
        <span class="year-val" id="daysLeft">—</span>
      </div>
    </div>

    <!-- Mantra card -->
    <div class="mantra-card">
      <span class="quote-mark">"</span>
      <p class="mantra-text">
        Remember — You have to <strong>fix</strong>, <strong>remove</strong> and <strong>reshape</strong>.
      </p>
    </div>

  </div>

  <script>
    function pad(n) { return String(n).padStart(2, '0'); }

    function update() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);

      const totalSecs = 24 * 3600;
      const secsLeft = Math.round((midnight - now) / 1000);
      const secsElapsed = totalSecs - secsLeft;

      const h = Math.floor(secsLeft / 3600);
      const m = Math.floor((secsLeft % 3600) / 60);
      const s = secsLeft % 60;

      document.getElementById('hours').textContent    = pad(h);
      document.getElementById('minutes').textContent  = pad(m);
      document.getElementById('seconds').textContent  = pad(s);

      // days left in year
      const endOfYear = new Date(now.getFullYear(), 11, 31);
      endOfYear.setHours(23,59,59,999);
      const daysLeft = Math.ceil((endOfYear - now) / (1000 * 3600 * 24));
      document.getElementById('daysLeft').textContent = daysLeft + ' days';
      document.getElementById('yearNum').textContent = now.getFullYear();
      const pctRemaining = (secsLeft / totalSecs) * 100;
      const pctLeft = pctRemaining.toFixed(1);

      document.getElementById('percentBadge').textContent = pctLeft + '%';
      document.getElementById('fillBar').style.width = pctLeft + '%';


    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
